---
# defaults file for ansible-role-ansiboard
ansiboard_basedir: /var/www/html/ansiboard

ansiboard_host_facts:
  - label: Hostname
    key: hostname
  - label: Domain
    key: domain
  - label: FQDN
    key: fqdn
  - label: Distribution
    key: distribution
  - label: Distribution version
    key: distribution_version
  - label: OS family
    key: os_family
  - label: Kernel
    key: kernel
  - label: Architecture
    key: architecture
  - label: Python version
    key: python_version
  - label: IPv4 address
    key: default_ipv4
  - label: Total memory (MB)
    key: memtotal_mb
  - label: Processor count
    key: processor_count
  - label: Uptime (seconds)
    key: uptime_seconds
