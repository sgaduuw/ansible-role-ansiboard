---
# defaults file for ansible-role-ansiboard
ansiboard_basedir: /var/www/html/ansiboard

# Donut charts shown on group and all-hosts pages.
# Each entry produces a chart showing the distribution of a fact.
# Set to [] to disable charts.
ansiboard_group_charts:
  - label: Distribution
    key: distribution
  - label: Kernel
    key: kernel
  - label: Virtualization
    key: virtualization_role

# Columns shown in the group and all-hosts overview tables.
# Each entry has a label and a key (from ansible_facts).
# Optional 'format' field for computed values:
#   cores     - shows processor_cores/processor_vcpus
#   mem_gib   - converts memtotal_mb to GiB
#   ipv4      - extracts address from the default_ipv4 dict
#   uptime    - converts uptime_seconds to human-readable (43d, 5h, 15m)
#   facts_age - computes time since facts were gathered from date_time.epoch
ansiboard_group_columns:
  - label: Hostname
    key: hostname
  - label: Distro
    key: distribution
  - label: Version
    key: distribution_version
  - label: Kernel
    key: kernel
  - label: Arch
    key: architecture
  - label: Cores
    key: processor_cores
    format: cores
  - label: Mem (GiB)
    key: memtotal_mb
    format: mem_gib
  - label: IPv4
    key: default_ipv4
    format: ipv4
  - label: Uptime
    key: uptime_seconds
    format: uptime
  - label: Facts age
    key: date_time
    format: facts_age

# Facts shown on individual host pages.
# Keys refer to entries in the ansible_facts dictionary.
ansiboard_host_facts:
  - label: Hostname
    key: hostname
  - label: Domain
    key: domain
  - label: FQDN
    key: fqdn
  - label: Distribution
    key: distribution
  - label: Distribution version
    key: distribution_version
  - label: OS family
    key: os_family
  - label: Kernel
    key: kernel
  - label: Architecture
    key: architecture
  - label: Virtualization
    key: virtualization_role
  - label: Board
    key: board_name
  - label: Python version
    key: python_version
  - label: IPv4 address
    key: default_ipv4
  - label: Total memory (MB)
    key: memtotal_mb
  - label: Processor count
    key: processor_count
  - label: Uptime (seconds)
    key: uptime_seconds
