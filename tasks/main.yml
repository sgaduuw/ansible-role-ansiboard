---
# tasks file for ansible-role-ansiboard
- name: Create directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  with_items:
    - "{{ ansiboard_basedir }}"
    - "{{ ansiboard_basedir }}/groups"
    - "{{ ansiboard_basedir }}/hosts"

- name: Render front page
  ansible.builtin.template:
    src: frontpage.html.j2
    dest: "{{ ansiboard_basedir }}/index.html"
    mode: "0644"
  tags:
    - molecule-idempotence-notest

- name: Render all-hosts page
  ansible.builtin.template:
    src: allhosts.html.j2
    dest: "{{ ansiboard_basedir }}/all.html"
    mode: "0644"
  tags:
    - molecule-idempotence-notest

- name: Render individual group pages
  ansible.builtin.template:
    src: groupmembers.html.j2
    dest: "{{ ansiboard_basedir }}/groups/{{ item.key }}.html"
    mode: "0644"
  with_dict: "{{ groups }}"

- name: Render host pages
  ansible.builtin.template:
    src: host.html.j2
    dest: "{{ ansiboard_basedir }}/hosts/{{ item.key }}.html"
    mode: "0644"
  with_dict: "{{ hostvars }}"
  tags:
    - molecule-idempotence-notest

- name: Find existing group pages
  ansible.builtin.find:
    paths: "{{ ansiboard_basedir }}/groups"
    patterns: "*.html"
  register: _ansiboard_existing_groups

- name: Remove stale group pages
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _ansiboard_existing_groups.files }}"
  when: (item.path | basename | splitext | first) not in groups
  loop_control:
    label: "{{ item.path | basename }}"

- name: Find existing host pages
  ansible.builtin.find:
    paths: "{{ ansiboard_basedir }}/hosts"
    patterns: "*.html"
  register: _ansiboard_existing_hosts
  tags:
    - molecule-idempotence-notest

- name: Remove stale host pages
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _ansiboard_existing_hosts.files }}"
  when: (item.path | basename | splitext | first) not in hostvars
  loop_control:
    label: "{{ item.path | basename }}"
  tags:
    - molecule-idempotence-notest
