---
name: CI
on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "30 5 * * 1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: yamllint .
      - run: ansible-lint

  molecule:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rockylinux9
          - debian12
          - debian13
          - ubuntu2204
          - ubuntu2404
          - fedora42
          - fedora43
          - amazonlinux2023
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Set up role symlink
        run: |
          mkdir -p ~/.ansible/roles
          ln -s "$GITHUB_WORKSPACE" ~/.ansible/roles/ansiboard
      - name: Configure Docker for cgroups v2
        run: |
          echo '{"default-cgroupns-mode": "host"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
      - run: molecule test
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  notify-galaxy:
    needs: molecule
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Galaxy import
        run: >-
          curl -s -X POST
          -H "Authorization: Token ${{ secrets.GALAXY_API_KEY }}"
          https://galaxy.ansible.com/api/v1/notifications/
          -d '{"github_user":"sgaduuw","github_repo":"ansible-role-ansiboard"}'
