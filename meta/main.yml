galaxy_info:
  role_name: ansiboard
  author: sgaduuw
  description: Ansiboard is an Ansible dashboard that displays Host/Group information based on gathered facts.
  issue_tracker_url: https://github.com/sgaduuw/ansible-role-ansiboard/issues
  license: MIT
  min_ansible_version: "2.16"

  platforms:
    - name: EL
      versions:
        - "9"
    - name: Debian
      versions:
        - bookworm
        - trixie
    - name: Ubuntu
      versions:
        - jammy
        - noble
    - name: Fedora
      versions:
        - "42"
        - "43"
    - name: Amazon
      versions:
        - all

  galaxy_tags:
    - system
    - ansible
    - facts
    - dashboard

dependencies: []
