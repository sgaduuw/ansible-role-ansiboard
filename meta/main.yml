galaxy_info:
  role_name: ansiboard
  author: sgaduuw
  description: Ansiboard is an Ansible dashboard that displays Host/Group information based on gathered facts.
  issue_tracker_url: https://github.com/sgaduuw/ansible-role-ansiboard/issues
  license: MIT
  min_ansible_version: "2.16"

  platforms:
    - name: EL
      versions:
        - "8"
        - "9"
    - name: Debian
      versions:
        - bullseye
        - bookworm
    - name: Ubuntu
      versions:
        - jammy
        - noble
    - name: Fedora
      versions:
        - "41"
        - "42"
    - name: Amazon
      versions:
        - "2023"

  galaxy_tags:
    - system
    - ansible
    - facts
    - dashboard

dependencies: []
